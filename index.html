<div id="studio-dashboard">
    <!-- Character Section -->
    <section class="control-group">
        <h3>1. Design Character</h3>
        <textarea id="charPrompt" placeholder="e.g., A young boy in a sharp black suit, short hair, clean look"></textarea>
    </section>

    <!-- Environment Section -->
    <section class="control-group">
        <h3>2. Set Environment</h3>
        <textarea id="envPrompt" placeholder="e.g., A luxury office building, golden hour lighting, soft background blur"></textarea>
    </section>

    <!-- Action Section -->
    <section class="control-group">
        <h3>3. Direct Action & Camera</h3>
        <textarea id="actionPrompt" placeholder="e.g., Walking slowly toward the window, cinematic slow dolly-in"></textarea>
    </section>

    <button id="generateBtn">GENERATE CINEMATIC VIDEO</button>
</div>
